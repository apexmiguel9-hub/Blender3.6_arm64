name: Build Blender 3.6.22 for Android ARM64

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  ANDROID_API: 24
  NDK_VERSION: r26b

jobs:
  build:
    name: Build libblender.so for ARM64
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout this repo (patches, scripts)
        uses: actions/checkout@v4

      - name: Checkout Blender 3.6.22 (epai port)
        uses: actions/checkout@v4
        with:
          repository: dshawshank/Blender-android_arm64
          ref: blender-v3.6-release
          path: blender36

      - name: Checkout prebuilt Android libraries
        uses: actions/checkout@v4
        with:
          repository: dshawshank/lib-android_arm64
          path: lib-android_arm64

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: false

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build pkg-config bison flex gettext gcc g++ qemu-user-static binfmt-support

      - name: Patch hardcoded library paths in cmake modules
        run: |
          LIBDIR=${{ github.workspace }}/lib-android_arm64
          # Replace Windows hardcoded paths in all cmake files
          find blender36/build_files -name "*.cmake" -exec sed -i "s|D:/FreeProjects/Blender/Blender/lib-android_arm64|$LIBDIR|g" {} +
          sed -i "s|D:/FreeProjects/Blender/Blender/lib-android_arm64|$LIBDIR|g" blender36/CMakeLists.txt
          # Fix Python include dir (original has include/include/ but real path is include/Include/)
          sed -i 's|cpython/include/include/|cpython/include/Include/|g' blender36/build_files/cmake/Modules/FindPythonLibsUnix.cmake
          # pnglibconf.h is a generated file; copy from prebuilt
          cp "$LIBDIR/Png/include/libpng-1.6.40/scripts/pnglibconf.h.prebuilt" \
             "$LIBDIR/Png/include/libpng-1.6.40/pnglibconf.h"
          # Android NDK doesn't have execinfo.h / backtrace()
          sed -i 's|#  if defined(HAVE_EXECINFO_H)|#  if defined(HAVE_EXECINFO_H) \&\& !defined(__ANDROID__)|' \
            blender36/source/blender/blenlib/intern/system.c
          echo "=== Patched paths ==="

      - name: Build native host tools (datatoc)
        run: |
          mkdir -p /tmp/host_tools
          # Compile datatoc natively for x86_64, since cross-compiled ARM64
          # versions can't run under QEMU (missing Android linker).
          gcc -o /tmp/host_tools/datatoc \
            -I blender36/source/blender/datatoc \
            -I blender36/source/blender/makesdna \
            -I blender36/source/blender/blenlib \
            blender36/source/blender/datatoc/datatoc.c
          # datatoc_icon also needs libpng-dev
          sudo apt-get install -y libpng-dev 2>/dev/null || true
          gcc -o /tmp/host_tools/datatoc_icon \
            -I blender36/source/blender/datatoc \
            -I blender36/source/blender/makesdna \
            -I blender36/source/blender/blenlib \
            blender36/source/blender/datatoc/datatoc_icon.c \
            -lpng -lz -lm
          echo "=== Host tools built ==="

      - name: Configure Blender 3.6 for Android
        id: configure
        run: |
          mkdir -p blender36/build && cd blender36/build

          # Host tools (datatoc, makesdna, makesrna) are linked statically,
          # so QEMU user-mode (via binfmt_misc) can run them without the
          # Android system linker (/system/bin/linker64).
          cmake -G Ninja .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=${{ env.ANDROID_API }} \
            -DWITH_BLENDER=ON \
            -DWITH_PLAYER=OFF \
            -DWITH_GAMEENGINE=OFF \
            -DWITH_CYCLES=ON \
            -DWITH_COMPOSITOR=ON \
            -DWITH_FREESTYLE=ON \
            -DWITH_OPENCOLORIO=ON \
            -DWITH_OPENVDB=ON \
            -DWITH_AUDASPACE=ON \
            -DWITH_CODEC_FFMPEG=ON \
            -DWITH_OPENAL=ON \
            -DWITH_SDL=ON \
            -DWITH_PYTHON=ON \
            -DWITH_OPENIMAGEIO=ON \
            -DWITH_BOOST=ON \
            -DWITH_LIBMV=ON \
            -DWITH_INTERNATIONAL=ON \
            -DWITH_INSTALL_PORTABLE=ON \
            -DWITH_HEADLESS=OFF \
            -DWITH_OPENMP=ON \
            -DWITH_GHOST_WAYLAND=ON \
            -DWITH_IMAGE_TIFF=ON \
            -DWITH_IMAGE_OPENEXR=ON \
            -DWITH_ALEMBIC=ON \
            -DWITH_USD=ON \
            -DWITH_INPUT_NDOF=OFF \
            -DWITH_X11=OFF \
            -DWITH_GHOST_X11=OFF \
            -DWITH_GHOST_WAYLAND_DYNLOAD=OFF \
            -DWITH_GHOST_WAYLAND_LIBDECOR=OFF \
            -DWITH_GHOST_WAYLAND_DBUS=OFF \
            -DWITH_MEM_JEMALLOC=OFF \
            -DWITH_TBB=ON \
            -DWITH_GMP=ON \
            -DWITH_OPENSUBDIV=ON \
            -DWITH_OPENCOLLADA=ON \
            -DWITH_FFTW3=ON \
            -DWITH_OPENIMAGEDENOISE=ON \
            -DWITH_COMPOSITOR_CPU=OFF \
            -DWITH_CODEC_FFMPEG=OFF \
            -DWITH_XR_OPENXR=OFF \
            -DWITH_CPU_SSE=OFF \
            -DWITH_CPU_AVX=OFF \
            -DWITH_CPU_AVX2=OFF \
            -DCMAKE_C_FLAGS="-fPIC -Os -DANDROID" \
            -DCMAKE_CXX_FLAGS="-fPIC -Os -DANDROID" \
            -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++ -Wl,-z,max-page-size=4096" \
            -DCMAKE_SHARED_LINKER_FLAGS="-static-libgcc -static-libstdc++ -Wl,-z,max-page-size=4096" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_FIND_ROOT_PATH="${{ github.workspace }}/lib-android_arm64" \
            -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=BOTH \
            -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=BOTH \
            -DCMAKE_FIND_ROOT_PATH_MODE_PROGRAM=NEVER \
            -DCMAKE_SKIP_RPATH=ON \
            -DCMAKE_SKIP_INSTALL_RPATH=ON 2>&1 | tee cmake_config.log

      - name: Show CMake error on failure
        if: steps.configure.outcome == 'failure'
        run: |
          echo "=== CMake Configuration Failed ==="
          cat blender36/build/cmake_config.log
          echo "=== CMakeError.log ==="
          cat blender36/build/CMakeFiles/CMakeError.log 2>/dev/null || true

      - name: Patch build rules for host tools
        if: steps.configure.outcome == 'success'
        run: |
          # Replace build rules for datatoc/datatoc_icon with native binary copies
          # so ninja doesn't try to run ARM64 versions under QEMU.
          cd blender36/build
          python3 << 'PYEOF'
import pathlib
ninja = pathlib.Path('build.ninja').read_text()
# Replace the link rule for bin/datatoc binary with a copy command
import re
# Find the build rule for bin/datatoc
ninja = re.sub(
    r'build bin/datatoc: CXX_EXECUTABLE_LINKER.*?(?=\n\n|\Z)',
    r'build bin/datatoc: CUSTOM_COMMAND\n  command = cp /tmp/host_tools/datatoc $out\n  description = Copy native datatoc',
    ninja, count=1, flags=re.DOTALL)
ninja = re.sub(
    r'build bin/datatoc_icon: CXX_EXECUTABLE_LINKER.*?(?=\n\n|\Z)',
    r'build bin/datatoc_icon: CUSTOM_COMMAND\n  command = cp /tmp/host_tools/datatoc_icon $out\n  description = Copy native datatoc_icon',
    ninja, count=1, flags=re.DOTALL)
pathlib.Path('build.ninja').write_text(ninja)
print("build.ninja patched for datatoc/datatoc_icon")
PYEOF

      - name: Build Blender
        if: steps.configure.outcome == 'success'
        run: |
          set -o pipefail
          cd blender36/build
          ninja -j$(nproc) 2>&1 | tee build.log

      - name: Collect outputs
        if: always()
        run: |
          mkdir -p ${{ github.workspace }}/output
          echo "=== Searching for built files ==="
          find ${{ github.workspace }}/blender36/build -name "*.so" -o -name "*.a" 2>/dev/null | head -50
          find ${{ github.workspace }}/blender36/build -name "libblender*" 2>/dev/null | head -10
          # Copy all .a files (Blender modules) for APK linking
          find ${{ github.workspace }}/blender36/build -name "libbf_*.a" -exec cp {} ${{ github.workspace }}/output/ \; 2>/dev/null || true
          find ${{ github.workspace }}/blender36/build -name "libextern_*.a" -exec cp {} ${{ github.workspace }}/output/ \; 2>/dev/null || true
          find ${{ github.workspace }}/blender36/build -name "libcycles_*.a" -exec cp {} ${{ github.workspace }}/output/ \; 2>/dev/null || true
          # Copy the final .so if built
          cp ${{ github.workspace }}/blender36/build/lib/libblender.so ${{ github.workspace }}/output/ 2>/dev/null || true
          # Copy logs
          cp blender36/build/cmake_config.log ${{ github.workspace }}/output/ 2>/dev/null || true
          cp blender36/build/build.log ${{ github.workspace }}/output/ 2>/dev/null || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blender36-build-output
          path: ${{ github.workspace }}/output/*
