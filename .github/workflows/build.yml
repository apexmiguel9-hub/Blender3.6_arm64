name: Build Blender 2.79b Android .so

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  ANDROID_API: 24
  NDK_VERSION: r26b

jobs:
  build:
    name: Build libblender.so for ARM64
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout this repo (patches, wrappers, scripts)
        uses: actions/checkout@v4

      - name: Checkout Blender 2.79b
        uses: actions/checkout@v4
        with:
          repository: blender/blender
          ref: v2.79b
          path: blender279

      - name: Checkout GL4ES
        uses: actions/checkout@v4
        with:
          repository: ptitSeb/gl4es
          path: gl4es

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: false

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build pkg-config bison flex gettext gcc g++ qemu-user-static binfmt-support

      - name: Build Android dependencies (zlib, jpeg, png)
        run: |
          export PREFIX=${{ github.workspace }}/android-libs
          export TOOLCHAIN=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake
          export COMMON_CMAKE="-G Ninja -DCMAKE_TOOLCHAIN_FILE=$TOOLCHAIN -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=${{ env.ANDROID_API }} -DCMAKE_INSTALL_PREFIX=$PREFIX"
          mkdir -p $PREFIX

          # Build zlib
          git clone --depth 1 --branch v1.3.1 https://github.com/madler/zlib /tmp/zlib
          cmake -S /tmp/zlib -B /tmp/zlib/build $COMMON_CMAKE
          ninja -C /tmp/zlib/build install

          # Build libjpeg-turbo
          git clone --depth 1 --branch 3.0.1 https://github.com/libjpeg-turbo/libjpeg-turbo /tmp/jpeg
          cmake -S /tmp/jpeg -B /tmp/jpeg/build $COMMON_CMAKE -DENABLE_SHARED=OFF -DWITH_TURBOJPEG=OFF
          ninja -C /tmp/jpeg/build install

          # Build libpng (depends on zlib)
          git clone --depth 1 --branch v1.6.43 https://github.com/glennrp/libpng /tmp/png
          cmake -S /tmp/png -B /tmp/png/build $COMMON_CMAKE \
            -DPNG_SHARED=OFF -DPNG_STATIC=ON \
            -DZLIB_LIBRARY=$PREFIX/lib/libz.a -DZLIB_INCLUDE_DIR=$PREFIX/include
          ninja -C /tmp/png/build install

          echo "=== Android libraries ==="
          find $PREFIX -type f | sort

      - name: Apply Android patches to Blender
        run: |
          python3 ${{ github.workspace }}/scripts/apply_patches.py \
            ${{ github.workspace }}/blender279 \
            ${{ github.workspace }}

      - name: Build GL4ES static for Android
        run: |
          cd gl4es
          mkdir -p build && cd build
          cmake -G Ninja .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=${{ env.ANDROID_API }} \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/gl4es-install \
            -DSTATICLIB=ON \
            -DDEFAULT_ES=2 \
            -DNO_INIT_CONSTRUCTOR=ON
          ninja -j$(nproc)
          echo "=== GL4ES output ==="
          mkdir -p ${{ github.workspace }}/gl4es-install/lib
          mkdir -p ${{ github.workspace }}/gl4es-install/include
          cp ../lib/libGL.a ${{ github.workspace }}/gl4es-install/lib/
          cp -r ../include/* ${{ github.workspace }}/gl4es-install/include/
          find ${{ github.workspace }}/gl4es-install -type f

      - name: Configure Blender for Android
        continue-on-error: true
        id: configure
        run: |
          mkdir -p blender279/build && cd blender279/build

          # Host tools (datatoc, makesdna, makesrna) are linked statically,
          # so QEMU user-mode (via binfmt_misc) can run them without the
          # Android system linker (/system/bin/linker64).
          cmake -G Ninja .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=${{ env.ANDROID_API }} \
            -DWITH_BLENDER=ON \
            -DWITH_PLAYER=OFF \
            -DWITH_GAMEENGINE=OFF \
            -DWITH_CYCLES=OFF \
            -DWITH_COMPOSITOR=OFF \
            -DWITH_FREESTYLE=OFF \
            -DWITH_OPENCOLORIO=OFF \
            -DWITH_OPENVDB=OFF \
            -DWITH_CODEC_FFMPEG=OFF \
            -DWITH_CODEC_SNDFILE=OFF \
            -DWITH_OPENAL=OFF \
            -DWITH_SDL=OFF \
            -DWITH_PYTHON=OFF \
            -DWITH_INTERNATIONAL=OFF \
            -DWITH_INSTALL_PORTABLE=ON \
            -DWITH_ANDROID_MODULE=ON \
            -DWITH_HEADLESS=OFF \
            -DWITH_OPENMP=OFF \
            -DWITH_SYSTEM_GLES=OFF \
            -DWITH_SYSTEM_GLEW=OFF \
            -DWITH_GHOST_DEBUG=OFF \
            -DWITH_IMAGE_TIFF=OFF \
            -DWITH_IMAGE_OPENEXR=OFF \
            -DGL4ES_LIBRARY=${{ github.workspace }}/gl4es-install/lib/libGL.a \
            -DGL4ES_INCLUDE_DIR=${{ github.workspace }}/gl4es-install/include \
            -DCMAKE_C_FLAGS="-fPIC -static-libgcc -Os -DANDROID" \
            -DCMAKE_CXX_FLAGS="-fPIC -static-libstdc++ -Os -DANDROID" \
            -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++ -Wl,-z,max-page-size=4096" \
            -DCMAKE_SHARED_LINKER_FLAGS="-static-libgcc -static-libstdc++ -Wl,-z,max-page-size=4096" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_FIND_ROOT_PATH="${{ github.workspace }}/gl4es-install;${{ github.workspace }}/android-libs" \
            -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=BOTH \
            -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=BOTH \
            -DCMAKE_FIND_ROOT_PATH_MODE_PROGRAM=NEVER \
            -DCMAKE_SKIP_RPATH=ON \
            -DCMAKE_SKIP_INSTALL_RPATH=ON 2>&1 | tee cmake_config.log

      - name: Show CMake error on failure
        if: steps.configure.outcome == 'failure'
        run: |
          echo "=== CMake Configuration Failed ==="
          cat blender279/build/cmake_config.log
          echo "=== CMakeError.log ==="
          cat blender279/build/CMakeFiles/CMakeError.log 2>/dev/null || true

      - name: Build Blender
        if: steps.configure.outcome == 'success'
        continue-on-error: true
        run: |
          cd blender279/build
          ninja -j$(nproc) 2>&1 | tee build.log

      - name: Collect outputs
        if: always()
        run: |
          mkdir -p ${{ github.workspace }}/output
          echo "=== Searching for built files ==="
          find ${{ github.workspace }}/blender279/build -name "*.so" -o -name "*.a" -o -name "blender" 2>/dev/null | head -30
          find ${{ github.workspace }}/blender279/build -name "libblender*" 2>/dev/null | head -10
          # Copy the .so if built
          cp ${{ github.workspace }}/blender279/build/lib/libblender.so ${{ github.workspace }}/output/ 2>/dev/null || true
          find ${{ github.workspace }}/blender279/build -name "libblender*" -exec cp {} ${{ github.workspace }}/output/ \; 2>/dev/null || true
          # Copy logs
          cp blender279/build/cmake_config.log ${{ github.workspace }}/output/ 2>/dev/null || true
          cp blender279/build/build.log ${{ github.workspace }}/output/ 2>/dev/null || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blender279-build-output
          path: ${{ github.workspace }}/output/*
