name: Build Blender 3.6.22 for Android ARM64

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  ANDROID_API: 24
  NDK_VERSION: r26b

jobs:
  build:
    name: Build libblender.so for ARM64
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout this repo (patches, scripts)
        uses: actions/checkout@v4

      - name: Checkout Blender 3.6.22 (epai port)
        uses: actions/checkout@v4
        with:
          repository: dshawshank/Blender-android_arm64
          ref: blender-v3.6-release
          path: blender36

      - name: Checkout prebuilt Android libraries
        uses: actions/checkout@v4
        with:
          repository: dshawshank/lib-android_arm64
          path: lib-android_arm64

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: false

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build pkg-config bison flex gettext gcc g++ qemu-user-static binfmt-support

      - name: Patch hardcoded library paths in cmake modules
        run: |
          LIBDIR=${{ github.workspace }}/lib-android_arm64
          # Replace Windows hardcoded paths in ALL cmake files across the tree
          find blender36 -name "*.cmake" -exec sed -i "s|D:/FreeProjects/Blender/Blender/lib-android_arm64|$LIBDIR|g" {} +
          find blender36 -name "CMakeLists.txt" -exec sed -i "s|D:/FreeProjects/Blender/Blender/lib-android_arm64|$LIBDIR|g" {} +
          # Fix Python include dir (original has include/include/ but real path is include/Include/)
          sed -i 's|cpython/include/include/|cpython/include/Include/|g' blender36/build_files/cmake/Modules/FindPythonLibsUnix.cmake
          # pnglibconf.h is a generated file; copy from prebuilt
          cp "$LIBDIR/Png/include/libpng-1.6.40/scripts/pnglibconf.h.prebuilt" \
             "$LIBDIR/Png/include/libpng-1.6.40/pnglibconf.h"
          # Android NDK doesn't have execinfo.h / backtrace()
          sed -i 's|#  if defined(HAVE_EXECINFO_H)|#  if defined(HAVE_EXECINFO_H) \&\& !defined(__ANDROID__)|' \
            blender36/source/blender/blenlib/intern/system.c
          echo "=== Patched paths ==="

      - name: Build native host tools (datatoc)
        run: |
          mkdir -p /tmp/host_tools
          # Compile datatoc natively for x86_64, since cross-compiled ARM64
          # versions can't run under QEMU (missing Android linker).
          # Use -DNDEBUG to match the Release build (asserts disabled).
          gcc -DNDEBUG -o /tmp/host_tools/datatoc \
            -I blender36/source/blender/datatoc \
            -I blender36/source/blender/makesdna \
            -I blender36/source/blender/blenlib \
            blender36/source/blender/datatoc/datatoc.c
          # datatoc_icon also needs libpng-dev
          sudo apt-get install -y libpng-dev 2>/dev/null || true
          gcc -DNDEBUG -o /tmp/host_tools/datatoc_icon \
            -I blender36/source/blender/datatoc \
            -I blender36/source/blender/makesdna \
            -I blender36/source/blender/blenlib \
            blender36/source/blender/datatoc/datatoc_icon.c \
            -lpng -lz -lm
          echo "=== Host tools built ==="

      - name: Configure Blender 3.6 for Android
        id: configure
        run: |
          mkdir -p blender36/build && cd blender36/build

          # Host tools (datatoc, makesdna, makesrna) are linked statically,
          # so QEMU user-mode (via binfmt_misc) can run them without the
          # Android system linker (/system/bin/linker64).
          cmake -G Ninja .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=${{ env.ANDROID_API }} \
            -DWITH_BLENDER=ON \
            -DWITH_PLAYER=OFF \
            -DWITH_GAMEENGINE=OFF \
            -DWITH_CYCLES=ON \
            -DWITH_COMPOSITOR=ON \
            -DWITH_FREESTYLE=ON \
            -DWITH_OPENCOLORIO=ON \
            -DWITH_OPENVDB=ON \
            -DWITH_AUDASPACE=ON \
            -DWITH_CODEC_FFMPEG=ON \
            -DWITH_OPENAL=ON \
            -DWITH_SDL=ON \
            -DWITH_PYTHON=ON \
            -DWITH_OPENIMAGEIO=ON \
            -DWITH_BOOST=ON \
            -DWITH_LIBMV=ON \
            -DWITH_INTERNATIONAL=ON \
            -DWITH_INSTALL_PORTABLE=ON \
            -DWITH_HEADLESS=OFF \
            -DWITH_OPENMP=ON \
            -DWITH_GHOST_WAYLAND=ON \
            -DWITH_IMAGE_TIFF=ON \
            -DWITH_IMAGE_OPENEXR=ON \
            -DWITH_ALEMBIC=ON \
            -DWITH_USD=ON \
            -DWITH_INPUT_NDOF=OFF \
            -DWITH_X11=OFF \
            -DWITH_GHOST_X11=OFF \
            -DWITH_GHOST_WAYLAND_DYNLOAD=OFF \
            -DWITH_GHOST_WAYLAND_LIBDECOR=OFF \
            -DWITH_GHOST_WAYLAND_DBUS=OFF \
            -DWITH_MEM_JEMALLOC=OFF \
            -DWITH_TBB=ON \
            -DWITH_GMP=ON \
            -DWITH_OPENSUBDIV=ON \
            -DWITH_OPENCOLLADA=ON \
            -DWITH_FFTW3=ON \
            -DWITH_OPENIMAGEDENOISE=ON \
            -DWITH_COMPOSITOR_CPU=OFF \
            -DWITH_CODEC_FFMPEG=OFF \
            -DWITH_XR_OPENXR=OFF \
            -DWITH_CPU_SSE=OFF \
            -DWITH_CPU_AVX=OFF \
            -DWITH_CPU_AVX2=OFF \
            -DCMAKE_C_FLAGS="-fPIC -Os -DANDROID" \
            -DCMAKE_CXX_FLAGS="-fPIC -Os -DANDROID -D_LIBCPP_ENABLE_CXX17_REMOVED_FEATURES -Wno-enum-constexpr-conversion" \
            -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++ -Wl,-z,max-page-size=4096" \
            -DCMAKE_SHARED_LINKER_FLAGS="-static-libgcc -static-libstdc++ -Wl,-z,max-page-size=4096" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_FIND_ROOT_PATH="${{ github.workspace }}/lib-android_arm64" \
            -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=BOTH \
            -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=BOTH \
            -DCMAKE_FIND_ROOT_PATH_MODE_PROGRAM=NEVER \
            -DCMAKE_SKIP_RPATH=ON \
            -DCMAKE_SKIP_INSTALL_RPATH=ON 2>&1 | tee cmake_config.log

      - name: Show CMake error on failure
        if: steps.configure.outcome == 'failure'
        run: |
          echo "=== CMake Configuration Failed ==="
          cat blender36/build/cmake_config.log
          echo "=== CMakeError.log ==="
          cat blender36/build/CMakeFiles/CMakeError.log 2>/dev/null || true

      - name: Pre-place native host tools and patch build rules
        if: steps.configure.outcome == 'success'
        run: |
          mkdir -p blender36/build/bin
          cp /tmp/host_tools/datatoc blender36/build/bin/datatoc
          cp /tmp/host_tools/datatoc_icon blender36/build/bin/datatoc_icon
          cd blender36/build

          # Pre-generate icon sprite PNGs using Python (Pillow).
          # Native datatoc_icon segfaults on these .dat files, so we
          # sidestep it entirely.
          pip install Pillow 2>/dev/null || sudo apt-get install -y python3-pil 2>/dev/null || true
          python3 << 'PYEOF'
          import os, struct, sys
          try:
              from PIL import Image
          except ImportError:
              print("Pillow not available, icon generation skipped")
              sys.exit(0)

          def gen_icons(set_name):
              src_dir = "../release/datafiles/" + set_name
              dst_png = "release/datafiles/" + set_name + ".png"
              if not os.path.isdir(src_dir):
                  return
              os.makedirs("release/datafiles", exist_ok=True)
              cw = ch = 0
              canvas = None
              for fname in sorted(os.listdir(src_dir)):
                  if not fname.endswith('.dat'):
                      continue
                  with open(os.path.join(src_dir, fname), 'rb') as f:
                      data = f.read()
                  if len(data) < 24:
                      continue
                  iw, ih, ox, oy, cwn, chn = struct.unpack_from('<IIIIII', data, 0)
                  px = data[24:]
                  if len(px) < iw * ih * 4:
                      continue
                  if canvas is None:
                      cw, ch = cwn, chn
                      canvas = bytearray(cw * ch * 4)
                  for y in range(ih):
                      for x in range(iw):
                          si = (y * iw + x) * 4
                          dx = ox + x; dy = oy + y
                          if dx < cw and dy < ch:
                              di = (dy * cw + dx) * 4
                              canvas[di:di+4] = px[si:si+4]
              if canvas:
                  Image.frombytes('RGBA', (cw, ch), bytes(canvas)).save(dst_png)
                  print(set_name + ": " + str(cw) + "x" + str(ch))

          gen_icons('blender_icons16')
          gen_icons('blender_icons32')
          PYEOF

          # Convert pre-generated PNGs to C source using working datatoc
          for icon in blender_icons16 blender_icons32; do
            if [ -f "release/datafiles/${icon}.png" ]; then
              ./bin/datatoc "release/datafiles/${icon}.png" \
                           "release/datafiles/${icon}.png.c"
              echo "${icon}.png.c generated"
            fi
          done

          # Patch build.ninja: replace native binary build rules with cp
          # and replace icon sprite rules with no-op cp (files pre-generated).
          cat > /tmp/patch_ninja.py << 'PYEOF'
          import re
          with open('build.ninja') as f:
              t = f.read()

          def replace_rule(pattern, replacement, count=1):
              global t
              t = re.sub(pattern, replacement, t, count=count, flags=re.MULTILINE | re.DOTALL)

          # Binary build rules: copy native binaries instead of linking
          for name, path in (('datatoc', '/tmp/host_tools/datatoc'),
                             ('datatoc_icon', '/tmp/host_tools/datatoc_icon')):
              pat = r'^build bin/' + re.escape(name) + r': .*?^(?=\S|\Z)'
              rep = ('build bin/' + name + ': CUSTOM_COMMAND\n'
                     '  COMMAND = cp ' + path + ' bin/' + name + '\n'
                     '  RESTAT = 1\n')
              replace_rule(pat, rep)

          # Icon sprite rules: no-op (files pre-generated)
          for icon in ('blender_icons16', 'blender_icons32'):
              pat = (r'^build release/datafiles/' + re.escape(icon) +
                     r'\.png release/datafiles/' + re.escape(icon) +
                     r'\.png\.c:.*?^(?=\S|\Z)')
              rep = ('build release/datafiles/' + icon + '.png release/datafiles/' +
                     icon + '.png.c: CUSTOM_COMMAND\n'
                     '  COMMAND = cp release/datafiles/' + icon + '.png ' +
                     'release/datafiles/' + icon + '.png && '
                     'cp release/datafiles/' + icon + '.png.c ' +
                     'release/datafiles/' + icon + '.png.c\n'
                     '  RESTAT = 1\n')
              replace_rule(pat, rep)

          with open('build.ninja', 'w') as f:
              f.write(t)
          print('build.ninja patched')
          PYEOF
          python3 /tmp/patch_ninja.py



      - name: Build Blender
        if: steps.configure.outcome == 'success'
        run: |
          set -o pipefail
          cd blender36/build
          ninja -j$(nproc) 2>&1 | tee build.log

      - name: Collect outputs
        if: always()
        run: |
          mkdir -p ${{ github.workspace }}/output
          echo "=== Searching for built files ==="
          find ${{ github.workspace }}/blender36/build -name "*.so" -o -name "*.a" 2>/dev/null | head -50
          find ${{ github.workspace }}/blender36/build -name "libblender*" 2>/dev/null | head -10
          # Copy all .a files (Blender modules) for APK linking
          find ${{ github.workspace }}/blender36/build -name "libbf_*.a" -exec cp {} ${{ github.workspace }}/output/ \; 2>/dev/null || true
          find ${{ github.workspace }}/blender36/build -name "libextern_*.a" -exec cp {} ${{ github.workspace }}/output/ \; 2>/dev/null || true
          find ${{ github.workspace }}/blender36/build -name "libcycles_*.a" -exec cp {} ${{ github.workspace }}/output/ \; 2>/dev/null || true
          # Copy the final .so if built
          cp ${{ github.workspace }}/blender36/build/lib/libblender.so ${{ github.workspace }}/output/ 2>/dev/null || true
          # Copy logs
          cp blender36/build/cmake_config.log ${{ github.workspace }}/output/ 2>/dev/null || true
          cp blender36/build/build.log ${{ github.workspace }}/output/ 2>/dev/null || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blender36-build-output
          path: ${{ github.workspace }}/output/*
