name: Build Blender 3.6.22 for Android ARM64

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  ANDROID_API: 24
  NDK_VERSION: r26b

jobs:
  build:
    name: Build libblender.so for ARM64
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout this repo (patches, scripts)
        uses: actions/checkout@v4

      - name: Checkout Blender 3.6.22 (epai port)
        uses: actions/checkout@v4
        with:
          repository: dshawshank/Blender-android_arm64
          ref: blender-v3.6-release
          path: blender36

      - name: Checkout prebuilt Android libraries
        uses: actions/checkout@v4
        with:
          repository: dshawshank/lib-android_arm64
          path: lib-android_arm64

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: false

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build pkg-config bison flex gettext gcc g++ qemu-user-static binfmt-support

      - name: Patch hardcoded library paths in cmake modules
        run: |
          LIBDIR=${{ github.workspace }}/lib-android_arm64
          # Replace Windows hardcoded paths in ALL cmake files across the tree
          find blender36 -name "*.cmake" -exec sed -i "s|D:/FreeProjects/Blender/Blender/lib-android_arm64|$LIBDIR|g" {} +
          find blender36 -name "CMakeLists.txt" -exec sed -i "s|D:/FreeProjects/Blender/Blender/lib-android_arm64|$LIBDIR|g" {} +
          # Fix Python include dir (original has include/include/ but real path is include/Include/)
          sed -i 's|cpython/include/include/|cpython/include/Include/|g' blender36/build_files/cmake/Modules/FindPythonLibsUnix.cmake
          # pnglibconf.h is a generated file; copy from prebuilt
          cp "$LIBDIR/Png/include/libpng-1.6.40/scripts/pnglibconf.h.prebuilt" \
             "$LIBDIR/Png/include/libpng-1.6.40/pnglibconf.h"
          # Android NDK doesn't have execinfo.h / backtrace()
          sed -i 's|#  if defined(HAVE_EXECINFO_H)|#  if defined(HAVE_EXECINFO_H) \&\& !defined(__ANDROID__)|' \
            blender36/source/blender/blenlib/intern/system.c
          echo "=== Patched paths ==="

      - name: Build native host tools (datatoc)
        run: |
          mkdir -p /tmp/host_tools
          # Compile datatoc natively for x86_64, since cross-compiled ARM64
          # versions can't run under QEMU (missing Android linker).
          # Use -DNDEBUG to match the Release build (asserts disabled).
          gcc -DNDEBUG -o /tmp/host_tools/datatoc \
            -I blender36/source/blender/datatoc \
            -I blender36/source/blender/makesdna \
            -I blender36/source/blender/blenlib \
            blender36/source/blender/datatoc/datatoc.c
          # datatoc_icon also needs libpng-dev
          sudo apt-get install -y libpng-dev 2>/dev/null || true
          gcc -DNDEBUG -o /tmp/host_tools/datatoc_icon \
            -I blender36/source/blender/datatoc \
            -I blender36/source/blender/makesdna \
            -I blender36/source/blender/blenlib \
            blender36/source/blender/datatoc/datatoc_icon.c \
            -lpng -lz -lm
          echo "=== Host tools built ==="

      - name: Configure Blender 3.6 for Android
        id: configure
        run: |
          mkdir -p blender36/build && cd blender36/build

          # Host tools (datatoc, makesdna, makesrna) are linked statically,
          # so QEMU user-mode (via binfmt_misc) can run them without the
          # Android system linker (/system/bin/linker64).
          cmake -G Ninja .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=${{ env.ANDROID_API }} \
            -DWITH_BLENDER=ON \
            -DWITH_PLAYER=OFF \
            -DWITH_GAMEENGINE=OFF \
            -DWITH_CYCLES=ON \
            -DWITH_COMPOSITOR=ON \
            -DWITH_FREESTYLE=ON \
            -DWITH_OPENCOLORIO=ON \
            -DWITH_OPENVDB=ON \
            -DWITH_AUDASPACE=ON \
            -DWITH_CODEC_FFMPEG=ON \
            -DWITH_OPENAL=ON \
            -DWITH_SDL=ON \
            -DWITH_PYTHON=ON \
            -DWITH_OPENIMAGEIO=ON \
            -DWITH_BOOST=ON \
            -DWITH_LIBMV=ON \
            -DWITH_INTERNATIONAL=ON \
            -DWITH_INSTALL_PORTABLE=ON \
            -DWITH_HEADLESS=OFF \
            -DWITH_OPENMP=ON \
            -DWITH_GHOST_WAYLAND=ON \
            -DWITH_IMAGE_TIFF=ON \
            -DWITH_IMAGE_OPENEXR=ON \
            -DWITH_ALEMBIC=ON \
            -DWITH_USD=ON \
            -DWITH_INPUT_NDOF=OFF \
            -DWITH_X11=OFF \
            -DWITH_GHOST_X11=OFF \
            -DWITH_GHOST_WAYLAND_DYNLOAD=OFF \
            -DWITH_GHOST_WAYLAND_LIBDECOR=OFF \
            -DWITH_GHOST_WAYLAND_DBUS=OFF \
            -DWITH_MEM_JEMALLOC=OFF \
            -DWITH_TBB=ON \
            -DWITH_GMP=ON \
            -DWITH_OPENSUBDIV=ON \
            -DWITH_OPENCOLLADA=ON \
            -DWITH_FFTW3=ON \
            -DWITH_OPENIMAGEDENOISE=ON \
            -DWITH_COMPOSITOR_CPU=OFF \
            -DWITH_CODEC_FFMPEG=OFF \
            -DWITH_XR_OPENXR=OFF \
            -DWITH_CPU_SSE=OFF \
            -DWITH_CPU_AVX=OFF \
            -DWITH_CPU_AVX2=OFF \
            -DCMAKE_C_FLAGS="-fPIC -Os -DANDROID" \
            -DCMAKE_CXX_FLAGS="-fPIC -Os -DANDROID -D_LIBCPP_ENABLE_CXX17_REMOVED_FEATURES -Wno-enum-constexpr-conversion" \
            -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++ -Wl,-z,max-page-size=4096" \
            -DCMAKE_SHARED_LINKER_FLAGS="-static-libgcc -static-libstdc++ -Wl,-z,max-page-size=4096" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_FIND_ROOT_PATH="${{ github.workspace }}/lib-android_arm64" \
            -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=BOTH \
            -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=BOTH \
            -DCMAKE_FIND_ROOT_PATH_MODE_PROGRAM=NEVER \
            -DCMAKE_SKIP_RPATH=ON \
            -DCMAKE_SKIP_INSTALL_RPATH=ON 2>&1 | tee cmake_config.log

      - name: Show CMake error on failure
        if: steps.configure.outcome == 'failure'
        run: |
          echo "=== CMake Configuration Failed ==="
          cat blender36/build/cmake_config.log
          echo "=== CMakeError.log ==="
          cat blender36/build/CMakeFiles/CMakeError.log 2>/dev/null || true

      - name: Pre-place native host tools and patch build rules
        if: steps.configure.outcome == 'success'
        run: |
          set -ex
          ls -la /tmp/host_tools/
          mkdir -p blender36/build/bin

          # Replace datatoc_icon with a simple no-op shell wrapper.
          # The icon PNGs and .c files are pre-generated below.
          echo '#!/bin/sh' > blender36/build/bin/datatoc_icon
          echo 'exit 0' >> blender36/build/bin/datatoc_icon
          chmod +x blender36/build/bin/datatoc_icon
          cp /tmp/host_tools/datatoc blender36/build/bin/datatoc
          ls -la blender36/build/bin/

          cd blender36/build

          # Pre-generate icon sprite PNGs. Use Pillow if available, else stdlib.
          python3 -c "from PIL import Image" 2>/dev/null || \
            (sudo apt-get install -y python3-pil 2>&1 || pip install Pillow 2>&1) || true
          python3 /dev/stdin << 'PYEOF'
          import os, struct, sys, zlib
          try:
              from PIL import Image
              HAVE_PIL = True
          except ImportError:
              HAVE_PIL = False

          def gen_icons(set_name):
              src_dir = "../release/datafiles/" + set_name
              dst_png = "release/datafiles/" + set_name + ".png"
              if not os.path.isdir(src_dir):
                  print("SKIP " + set_name + ": no source dir " + src_dir)
                  return
              os.makedirs("release/datafiles", exist_ok=True)
              cw = ch = 0
              canvas = None
              for fname in sorted(os.listdir(src_dir)):
                  if not fname.endswith('.dat'):
                      continue
                  with open(os.path.join(src_dir, fname), 'rb') as f:
                      data = f.read()
                  if len(data) < 24:
                      continue
                  iw, ih, ox, oy, cwn, chn = struct.unpack_from('<IIIIII', data, 0)
                  px = data[24:]
                  if len(px) < iw * ih * 4:
                      continue
                  if canvas is None:
                      cw, ch = cwn, chn
                      canvas = bytearray(cw * ch * 4)
                  for y in range(ih):
                      for x in range(iw):
                          si = (y * iw + x) * 4
                          dx = ox + x; dy = oy + y
                          if dx < cw and dy < ch:
                              di = (dy * cw + dx) * 4
                              canvas[di:di+4] = px[si:si+4]
              if canvas:
                  if HAVE_PIL:
                      Image.frombytes('RGBA', (cw, ch), bytes(canvas)).save(dst_png)
                  else:
                      def write_png(data, w, h, path):
                          def chunk(ctype, cdata):
                              c = ctype + cdata
                              return struct.pack('>I', len(cdata)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
                          with open(path, 'wb') as f:
                              f.write(b'\x89PNG\r\n\x1a\n')
                              f.write(chunk(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 6, 0, 0, 0)))
                              raw = b''
                              for y in range(h):
                                  raw += b'\x00' + data[y*w*4:(y+1)*w*4]
                              f.write(chunk(b'IDAT', zlib.compress(raw)))
                              f.write(chunk(b'IEND', b''))
                      write_png(bytes(canvas), cw, ch, dst_png)
                  print(set_name + ": " + str(cw) + "x" + str(ch) + " -> " + dst_png)
              else:
                  print("WARN: " + set_name + ": no icons generated")

          gen_icons('blender_icons16')
          gen_icons('blender_icons32')
          PYEOF

          # Convert pre-generated PNGs to C source using working datatoc
          for icon in blender_icons16 blender_icons32; do
            png="release/datafiles/${icon}.png"
            if [ -f "$png" ]; then
              ./bin/datatoc "$png" "release/datafiles/${icon}.png.c"
              echo "${icon}.png.c generated ("$(wc -c < "$png")" bytes)"
            fi
          done

          # Patch build.ninja
          python3 /dev/stdin << 'PYEOF'
          import re, sys, os

          def read_file(path):
              try:
                  with open(path) as f:
                      return f.read()
              except FileNotFoundError:
                  return None

          t = read_file('build.ninja')
          if t is None:
              print("FATAL: build.ninja not found in", os.getcwd())
              sys.exit(1)

          # Also read included ninja files (cmake >=3.30 may split rules)
          ninja_content = t
          for m in re.finditer(r'^include\s+(\S+)', t, re.MULTILINE):
              inc = m.group(1)
              inc_txt = read_file(inc)
              if inc_txt is not None:
                  print("Included ninja file: " + inc + " (" + str(len(inc_txt)) + " bytes)")
                  ninja_content += '\n' + inc_txt
              else:
                  print("WARNING: included ninja file not found: " + inc)

          # Diagnostic: list all .a build rules
          build_lines = [l for l in ninja_content.split('\n') if l.startswith('build ') and '.a:' in l]
          print("=== ALL .a BUILD RULES (" + str(len(build_lines)) + ") ===")
          for bl in build_lines:
              print("  " + bl.strip())

          # Diagnostic: list all .o build rules
          o_rules = [l for l in ninja_content.split('\n') if l.startswith('build ') and '.o:' in l]
          print("=== ALL .o BUILD RULES (" + str(len(o_rules)) + ") ===")
          for ol in o_rules[:10]:
              print("  " + ol.strip())
          if len(o_rules) > 10:
              print("  ... (" + str(len(o_rules) - 10) + " more)")

          # Diagnostic: list phony targets that depend on .a files
          phony_a_deps = set()
          for l in ninja_content.split('\n'):
              l = l.strip()
              if l.startswith('build ') and ': phony' in l:
                  deps = l.split(':')[1].replace('phony', '').strip()
                  for dep in deps.split():
                      dep = dep.strip()
                      if dep.endswith('.a') and dep not in phony_a_deps:
                          phony_a_deps.add(dep)
          print("=== PHONY TARGETS DEPENDING ON .a FILES (" + str(len(phony_a_deps)) + ") ===")
          for d in sorted(phony_a_deps):
              print("  " + d)

          # Check which .a deps are missing build rules
          existing_a_rules = set()
          for bl in build_lines:
              parts = bl.split(':')
              outputs = parts[0].replace('build ', '').strip().split()
              for out in outputs:
                  if out.endswith('.a'):
                      existing_a_rules.add(out)

          missing_a = sorted(phony_a_deps - existing_a_rules)
          print("=== MISSING .a BUILD RULES (" + str(len(missing_a)) + ") ===")
          for a in missing_a:
              print("  " + a)

          # Add dummy rules for ALL missing .a files
          dummy_block = ""
          for a in missing_a:
              dummy_block += ('build ' + a + ': CUSTOM_COMMAND\n'
                              '  COMMAND = ar crs ' + a + '\n'
                              '  RESTAT = 1\n\n')
          if dummy_block:
              with open('build.ninja', 'a') as f:
                  f.write('\n' + dummy_block)
              print("Added " + str(len(missing_a)) + " dummy .a build rules")

          # Binary build rules: datatoc gets cp'd from native build, datatoc_icon is no-op
          for name, path in (('datatoc', '/tmp/host_tools/datatoc'),
                             ('datatoc_icon', None)):
              pat = r'^build bin/' + re.escape(name) + r': .*?^(?=\S|\Z)'
              if path:
                  rep = ('build bin/' + name + ': CUSTOM_COMMAND\n'
                         '  COMMAND = cp ' + path + ' bin/' + name + '\n'
                         '  RESTAT = 1\n')
              else:
                  rep = ('build bin/' + name + ': CUSTOM_COMMAND\n'
                         '  COMMAND = :\n'
                         '  RESTAT = 1\n')
              m = re.search(pat, t, re.MULTILINE | re.DOTALL)
              if m:
                  print("Matched build rule for " + name)
                  t = re.sub(pat, rep, t, count=1, flags=re.MULTILINE | re.DOTALL)
              else:
                  print("NO MATCH for build rule: " + name)

          # Icon sprite rules: no-op (files pre-generated).
          for icon in ('blender_icons16', 'blender_icons32'):
              pat = (r'^build\s+(.*\$\s*\n)*.*release/datafiles/' +
                     re.escape(icon) +
                     r'\.png(.*\$\s*\n)*.*release/datafiles/' +
                     re.escape(icon) +
                     r'\.png\.c:.*?^(?=\S|\Z)')
              m = re.search(pat, t, re.MULTILINE | re.DOTALL)
              if m:
                  print("Matched icon rule for " + icon)
                  rep = ('build release/datafiles/' + icon +
                         '.png release/datafiles/' + icon +
                         '.png.c: CUSTOM_COMMAND\n'
                         '  COMMAND = :\n'
                         '  RESTAT = 1\n')
                  t = re.sub(pat, rep, t, count=1, flags=re.MULTILINE | re.DOTALL)
              else:
                  print("NO MATCH for icon rule: " + icon)

          with open('build.ninja', 'w') as f:
              f.write(t)
          print('build.ninja patched OK')
          PYEOF



      - name: Build Blender
        if: steps.configure.outcome == 'success'
        run: |
          set -x
          cd blender36/build
          {
            echo "=== NINJA DRY RUN ==="
            ninja -n 2>&1 | head -50 || echo "[ninja dry-run failed]"
            echo "=== TARGETS ==="
            ninja -t targets all 2>&1 | head -50 || echo "[ninja targets failed]"
            echo "=== EDGE COUNT ==="
            grep -cP '^build ' build.ninja || echo "0"
            grep -P '^include ' build.ninja 2>/dev/null || echo "(no includes)"
            echo "=== .a BUILD RULES ==="
            grep -P '^build\s+\S*\.a:' build.ninja 2>/dev/null || echo "(no .a rules in main file)"
            echo "=== FULL BUILD ==="
            ninja -j$(nproc) 2>&1; echo "==NINJA_EXIT=$?=="
            echo "=== FAILURES ==="
          } 2>&1 | tee build.log
          rc="$(grep '==NINJA_EXIT=' build.log | tail -1 | sed 's/.*==NINJA_EXIT=//;s/==.*//' || echo '1')"
          echo "Ninja exit code: $rc"
          if [ "${rc:-1}" -ne 0 ]; then
            echo "BUILD FAILED - ninja exit code $rc"
            exit 1
          fi
          echo "BUILD COMPLETED SUCCESSFULLY"

      - name: Collect outputs
        if: always()
        run: |
          set -x
          mkdir -p ${{ github.workspace }}/output
          echo "=== Searching for built files ==="
          find ${{ github.workspace }}/blender36/build -name "*.so" -o -name "*.a" 2>/dev/null | head -50 || echo "(no .so/.a found)"
          find ${{ github.workspace }}/blender36/build -name "libblender*" 2>/dev/null | head -10 || echo "(no libblender* found)"
          find ${{ github.workspace }}/blender36/build -name "*.o" 2>/dev/null | head -10 || echo "(no .o found)"
          # Copy all .a files (Blender modules) for APK linking
          echo "=== Copying .a files ==="
          ls ${{ github.workspace }}/blender36/build/lib/ 2>/dev/null || echo "(no lib dir)"
          find ${{ github.workspace }}/blender36/build -name "libbf_*.a" -exec cp {} ${{ github.workspace }}/output/ \; 2>/dev/null || true
          find ${{ github.workspace }}/blender36/build -name "libextern_*.a" -exec cp {} ${{ github.workspace }}/output/ \; 2>/dev/null || true
          find ${{ github.workspace }}/blender36/build -name "libcycles_*.a" -exec cp {} ${{ github.workspace }}/output/ \; 2>/dev/null || true
          # Copy the final .so if built
          cp ${{ github.workspace }}/blender36/build/lib/libblender.so ${{ github.workspace }}/output/ 2>/dev/null || echo "(no libblender.so)"
          # Copy logs and build files for diagnostics
          cp ${{ github.workspace }}/blender36/build/cmake_config.log ${{ github.workspace }}/output/ 2>/dev/null || echo "(no cmake_config.log)"
          cp ${{ github.workspace }}/blender36/build/build.log ${{ github.workspace }}/output/ 2>/dev/null || echo "(no build.log)"
          cp ${{ github.workspace }}/blender36/build/build.ninja ${{ github.workspace }}/output/build.ninja 2>/dev/null || echo "(no build.ninja)"
          cp ${{ github.workspace }}/blender36/build/CMakeFiles/rules.ninja ${{ github.workspace }}/output/rules.ninja 2>/dev/null || echo "(no rules.ninja)"
          echo "=== Output files ==="
          ls -la ${{ github.workspace }}/output/

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blender36-build-output
          path: ${{ github.workspace }}/output/*
